# yaml-language-server: $schema=../../packages/xinity-infoserver/models.schema.json
includes:
  - https://sysinfo.xinity.ai/models/v1.json

models:
  phi-3-vision:
    name: Phi-3 Vision
    url: https://huggingface.co/microsoft/Phi-3-vision-128k-instruct
    family: phi3
    weight: 8
    minKvCache: 2
    type: chat
    description: Lightweight model with vision capabilities
    entryVersion: 0.5.4
    tags: [vision]
    providerTags:
      vllm: [custom_code, vision]
    providers:
      vllm: "microsoft/Phi-3-vision-128k-instruct"
  ministral-3-m:
    name: Ministral-3-medium
    url: https://ollama.com/library/qwen3-coder-next
