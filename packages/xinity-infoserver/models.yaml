    tags: [tools]
    weight: 14
    minKvCache: 4
    entryVersion: 0.6.0
    providers:
      ollama: "ministral-3:14b-instruct-2512-fp16"
  qwen3-coder-next-large:
    name: Qwen coder Next
    url: https://ollama.com/library/qwen3-coder-next
    description: Coding model
    family: qwen3
    tags: [tools]
    type: chat
    weight: 14
    minKvCache: 4
    entryVersion: 0.6.0
    providers:
      ollama: "qwen3-coder-next:q8_0"
