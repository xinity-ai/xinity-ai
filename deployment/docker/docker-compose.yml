services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-xinity}
      POSTGRES_USER: ${POSTGRES_USER:-xinity}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - xinity-network
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-xinity}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
    volumes:
      - redis-data:/data
    networks:
      - xinity-network
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  gateway:
    image: ghcr.io/xinity-ai/xinity-ai-gateway:${VERSION:?VERSION is required (set in .env)}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - path: .env
        required: false
    environment:
      HOST: 0.0.0.0
      PORT: ${GATEWAY_PORT:-4121}
      DB_CONNECTION_URL: postgresql://${POSTGRES_USER:-xinity}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-xinity}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      INFOSERVER_URL: ${INFOSERVER_URL:-https://sysinfo.xinity.ai}
      WEB_SEARCH_ENGINE_URL: ${WEB_SEARCH_ENGINE_URL:-http://searxng:${SEARXNG_PORT:-8888}}
      RESPONSE_CACHE_TTL_SECONDS: ${RESPONSE_CACHE_TTL:-3600}
    networks:
      - xinity-network
    ports:
      - "127.0.0.1:${GATEWAY_PORT:-4121}:${GATEWAY_PORT:-4121}"

  dashboard:
    image: ghcr.io/xinity-ai/xinity-ai-dashboard:${VERSION:?VERSION is required (set in .env)}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - path: .env
        required: false
    environment:
      HTTP_PORT: ${DASHBOARD_PORT:-5121}
      NODE_ENV: production
      DB_CONNECTION_URL: postgresql://${POSTGRES_USER:-xinity}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-xinity}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:?BETTER_AUTH_SECRET is required}
      ORIGIN: ${ORIGIN:-http://localhost:${DASHBOARD_PORT:-5121}}
      HTTP_OVERRIDE_ORIGIN: ${HTTP_OVERRIDE_ORIGIN:-${ORIGIN:-http://localhost:${DASHBOARD_PORT:-5121}}}
      GATEWAY_URL: ${GATEWAY_URL:-http://localhost:${GATEWAY_PORT:-4121}}
      INFOSERVER_URL: ${INFOSERVER_URL:-https://sysinfo.xinity.ai}
      APP_NAME: ${APP_NAME:-Xinity Admin}
      SIGNUP_ENABLED: ${SIGNUP_ENABLED:-true}
    networks:
      - xinity-network
    ports:
      - "127.0.0.1:${DASHBOARD_PORT:-5121}:${DASHBOARD_PORT:-5121}"

  # Optional self-hosted model registry. Defaults off; dashboard uses the public
  # sysinfo.xinity.ai registry unless INFOSERVER_URL is overridden.
  infoserver:
    image: ghcr.io/xinity-ai/xinity-infoserver:${VERSION:?VERSION is required (set in .env)}
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    environment:
      PORT: ${INFOSERVER_PORT:-8090}
      MODEL_INFO_FILE: /data/models.yaml
    volumes:
      - ./models.yaml:/data/models.yaml:ro
    networks:
      - xinity-network
    profiles: [infoserver]

  # SEARXNG_SECRET must be set in .env before activating this profile. Compose
  # cannot enforce it via :?required because interpolation happens for all
  # services regardless of which profile is active.
  searxng:
    image: searxng/searxng:2026.2.6-b5bb27f23
    restart: unless-stopped
    environment:
      SEARXNG_SECRET: ${SEARXNG_SECRET:-}
      SEARXNG_BASE_URL: http://searxng:${SEARXNG_PORT:-8888}
    networks:
      - xinity-network
    profiles: [searxng]

  # Reverse proxy with automatic HTTPS. Activate with `--profile caddy` for a
  # public, domain-backed deployment. Without it, gateway and dashboard are
  # reachable on 127.0.0.1 for local evaluation.
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      - gateway
      - dashboard
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    environment:
      # DOMAIN and ACME_EMAIL must be set in .env before activating this
      # profile. Compose cannot enforce it via :?required because interpolation
      # happens for all services regardless of which profile is active. Caddy
      # itself will fail loudly with an empty DOMAIN or ACME_EMAIL.
      DOMAIN: ${DOMAIN:-}
      DASHBOARD_SUBDOMAIN: ${DASHBOARD_SUBDOMAIN:-dashboard}
      GATEWAY_SUBDOMAIN: ${GATEWAY_SUBDOMAIN:-api}
      INFOSERVER_SUBDOMAIN: ${INFOSERVER_SUBDOMAIN:-sysinfo}
      GATEWAY_PORT: ${GATEWAY_PORT:-4121}
      DASHBOARD_PORT: ${DASHBOARD_PORT:-5121}
      INFOSERVER_PORT: ${INFOSERVER_PORT:-8090}
      ACME_EMAIL: ${ACME_EMAIL:-}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    networks:
      - xinity-network
    profiles: [caddy]

networks:
  xinity-network:
    driver: bridge

volumes:
  postgres-data:
  redis-data:
  caddy-data:
  caddy-config:
