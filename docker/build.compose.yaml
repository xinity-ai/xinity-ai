# yaml-language-server: $schema=https://raw.githubusercontent.com/compose-spec/compose-spec/master/schema/compose-spec.json
# Build-only: used to build and tag images locally (e.g. `docker compose build gateway`).
# For local development infrastructure, see dev.compose.yaml.
# For a full deployment, see deployment/docker/.

services:
  gateway:
    build:
      context: ..
      dockerfile: packages/xinity-ai-gateway/Dockerfile
    image: ghcr.io/xinity-ai/xinity-ai-gateway:1

  dashboard:
    build:
      context: ..
      dockerfile: packages/xinity-ai-dashboard/Dockerfile
    image: ghcr.io/xinity-ai/xinity-ai-dashboard:1

  xinity-infoserver:
    build:
      context: ..
      dockerfile: packages/xinity-infoserver/Dockerfile
    image: ghcr.io/xinity-ai/xinity-infoserver
