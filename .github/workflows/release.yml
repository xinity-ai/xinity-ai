name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

# One release run per ref at a time. cancel-in-progress is off so we never
# interrupt a half-finished publish; a second push to the same tag queues.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions: {}

env:
  BUN_VERSION: "1.3.1"

jobs:
  # Standalone binaries via `bun build --compile` for linux x64/x64-baseline/arm64.
  build-binaries:
    name: "Binary: ${{ matrix.package }}"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - package: xinity-ai-gateway
            entry: src/gatewayServer.ts
            workdir: packages/xinity-ai-gateway
          - package: xinity-ai-daemon
            entry: src/index.ts
            workdir: packages/xinity-ai-daemon
          - package: xinity-infoserver
            entry: server.ts
            workdir: packages/xinity-infoserver
          - package: xinity-cli
            binary_name: xinity
            workdir: packages/xinity-cli
            custom_build: true
          - package: xinity-ai-dashboard
            workdir: packages/xinity-ai-dashboard
            custom_build: true
            pre_build: true
            build_flags: "--no-vite"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Pre-build (platform-independent step)
        if: ${{ matrix.pre_build }}
        working-directory: ${{ matrix.workdir }}
        run: |
          if [ -f example.env ]; then cp example.env .env; fi
          bun run build

      - name: Compile all targets and zip
        working-directory: ${{ matrix.workdir }}
        run: |
          if [ -f example.env ] && [ ! -f .env ]; then cp example.env .env; fi
          BINARY_NAME="${{ matrix.binary_name || matrix.package }}"

          for target in bun-linux-x64 bun-linux-x64-baseline bun-linux-arm64; do
            suffix="${target#bun-}"
            echo "::group::Compiling ${{ matrix.package }} for ${suffix}"

            if [ "${{ matrix.custom_build || 'false' }}" = "true" ]; then
              # Custom two-step build (bundle with plugins, then compile)
              bun run build.ts --target "$target" --outfile "${BINARY_NAME}" ${{ matrix.build_flags }}
            else
              bun build --compile --minify \
                --sourcemap=external \
                --target="${target}" \
                ${{ matrix.entry }} \
                --outfile "${BINARY_NAME}"
            fi

            zip "${{ matrix.package }}-${suffix}.zip" "${BINARY_NAME}" *.map 2>/dev/null || \
              zip "${{ matrix.package }}-${suffix}.zip" "${BINARY_NAME}"
            # v1.0.0+ packaging (TODO flip on at 1.0.0, drop the zip lines above):
            # tar -czf "${{ matrix.package }}-${suffix}.tar.gz" "${BINARY_NAME}" *.map 2>/dev/null || \
            #   tar -czf "${{ matrix.package }}-${suffix}.tar.gz" "${BINARY_NAME}"
            rm -f "${BINARY_NAME}" *.map

            echo "::endgroup::"
          done

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.package }}
          path: |
            ${{ matrix.workdir }}/*.zip
            ${{ matrix.workdir }}/*.tar.gz
          retention-days: 1

  build-bundles:
    name: JS bundles
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build gateway bundle
        working-directory: packages/xinity-ai-gateway
        run: |
          if [ -f example.env ]; then cp example.env .env; fi
          bun build --production --target=bun \
            --outfile xinity-ai-gateway.js \
            ./src/gatewayServer.ts

      - name: Build daemon bundle
        working-directory: packages/xinity-ai-daemon
        run: |
          if [ -f example.env ]; then cp example.env .env; fi
          bun build --production --target=bun \
            --outfile xinity-ai-daemon.js \
            ./src/index.ts

      - name: Build infoserver bundle
        working-directory: packages/xinity-infoserver
        run: |
          if [ -f example.env ]; then cp example.env .env; fi
          bun build --production --target=bun \
            --outfile xinity-infoserver.js \
            ./server.ts

      - name: Package database migrations
        run: tar czf db-migrations.tar.gz -C packages/common-db/db-migration .

      - name: Stage all bundles
        run: |
          mkdir staging
          cp packages/xinity-ai-gateway/xinity-ai-gateway.js staging/
          cp packages/xinity-ai-daemon/xinity-ai-daemon.js staging/
          cp packages/xinity-infoserver/xinity-infoserver.js staging/
          cp db-migrations.tar.gz staging/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bundles
          path: staging/
          retention-days: 1

  # Catch out-of-sync Dockerfiles before paying for a multi-arch build.
  check-dockerfile-sync:
    name: Verify Dockerfile sync
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - run: bun scripts/sync-dockerfile-manifests.ts --check

  # Tag-gated so `workflow_dispatch` from a branch can't push `:latest`.
  build-images:
    name: "Image: ${{ matrix.image }}"
    needs: check-dockerfile-sync
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      REGISTRY: ghcr.io
      IMAGE_NAMESPACE: ghcr.io/${{ github.repository_owner }}
      VERSION: ${{ github.ref_name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: xinity-ai-gateway
            context: .
            dockerfile: packages/xinity-ai-gateway/Dockerfile
          - image: xinity-ai-dashboard
            context: .
            dockerfile: packages/xinity-ai-dashboard/Dockerfile
          - image: xinity-infoserver
            context: .
            dockerfile: packages/xinity-infoserver/Dockerfile
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAMESPACE }}/${{ matrix.image }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=ref,event=branch
            type=raw,latest
            type=ref,event=pr
            type=sha
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.vendor=Xinity AI
            org.opencontainers.image.documentation=${{ github.server_url }}/${{ github.repository }}#readme

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: false  # Disable attestation manifests; GHCR rejects cross-blob HEAD requests they trigger on multi-arch pushes (403)
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # `needs:` every build job so a missing artifact can't produce a partial release.
  release:
    name: Create GitHub Release
    if: startsWith(github.ref, 'refs/tags/')
    needs: [build-binaries, build-bundles, build-images]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Generate changelog for this release
        run: |
          {
            echo 'RELEASE_NOTES<<CLIFF_EOF'
            bunx git-cliff --latest --strip header 2>/dev/null || true
            echo 'CLIFF_EOF'
          } >> "$GITHUB_ENV"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release
          merge-multiple: true

      - name: Add install script to release
        run: cp scripts/install.sh release/install.sh

      - name: Generate SHASUMS256.txt
        working-directory: release
        run: sha256sum * | sort > SHASUMS256.txt

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          body: |
            ${{ env.RELEASE_NOTES }}

            ---
            ## Quick Install (CLI)

            ```bash
            curl -fsSL "https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/install.sh" \
              | bash
            ```

            Or manually:

            ```bash
            curl -fSL "https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/xinity-cli-linux-x64.zip" \
              -o cli.zip
            unzip cli.zip
            mv xinity ~/.local/bin/xinity
            chmod +x ~/.local/bin/xinity
            ```

            ## Install (services)

            **Standalone binary** (no dependencies):

            ```bash
            # x64 (Haswell+, 2013 and later, recommended)
            curl -fSL "https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/xinity-ai-gateway-linux-x64.zip" \
              -o gateway.zip
            unzip gateway.zip
            chmod +x xinity-ai-gateway
            ./xinity-ai-gateway

            # x64-baseline (Nehalem+, maximum compatibility)
            curl -fSL "https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/xinity-ai-gateway-linux-x64-baseline.zip" \
              -o gateway.zip

            # arm64
            curl -fSL "https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/xinity-ai-gateway-linux-arm64.zip" \
              -o gateway.zip
            ```

            Replace `xinity-ai-gateway` with `xinity-ai-daemon`, `xinity-infoserver`, or `xinity-ai-dashboard` as needed.

            **JS bundle** (requires [Bun](https://bun.sh)):

            ```bash
            curl -fSL "https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/xinity-ai-gateway.js" \
              -o xinity-ai-gateway.js
            bun run xinity-ai-gateway.js
            ```

            **Container image** (multi-arch, `linux/amd64` and `linux/arm64`):

            ```bash
            docker pull ghcr.io/${{ github.repository_owner }}/xinity-ai-gateway:${{ github.ref_name }}
            docker pull ghcr.io/${{ github.repository_owner }}/xinity-ai-dashboard:${{ github.ref_name }}
            docker pull ghcr.io/${{ github.repository_owner }}/xinity-infoserver:${{ github.ref_name }}
            ```

            ## Verify

            ```bash
            curl -fSL "https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/SHASUMS256.txt" \
              -o SHASUMS256.txt
            sha256sum -c SHASUMS256.txt --ignore-missing
            ```

            ---
