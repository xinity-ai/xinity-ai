name: Build and push images

on:
  push:
    tags:
      - 'v*'

jobs:
  check-sync:
    name: Verify Dockerfile sync
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3"
      - run: bun scripts/sync-dockerfile-manifests.ts --check

  docker:
    needs: check-sync
    name: ${{ matrix.image }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      REGISTRY: ghcr.io
      IMAGE_NAMESPACE: ghcr.io/${{ github.repository_owner }}
      VERSION: ${{ github.ref_name }}
    strategy:
      matrix:
        include:
          - image: xinity-ai-gateway
            context: .
            dockerfile: packages/xinity-ai-gateway/Dockerfile
          - image: xinity-ai-dashboard
            context: .
            dockerfile: packages/xinity-ai-dashboard/Dockerfile
          - image: xinity-infoserver
            context: .
            dockerfile: packages/xinity-infoserver/Dockerfile
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAMESPACE }}/${{ matrix.image }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=ref,event=branch
            type=raw,latest
            type=ref,event=pr
            type=sha
          labels: |
            org.opencontainers.image.source=https://github.com/xinity-ai/xinity-ai
            org.opencontainers.image.vendor=Xinity AI
            org.opencontainers.image.documentation=https://github.com/xinity-ai/xinity-ai#readme

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: false  # Disable attestation manifests; GHCR rejects cross-blob HEAD requests they trigger on multi-arch pushes (403)
          cache-from: type=gha
          cache-to: type=gha,mode=max
