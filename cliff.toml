# git-cliff configuration
# https://git-cliff.org/docs/configuration
#
# Runs in --prepend mode: generates entries for commits since the last tag
# and prepends them to the existing CHANGELOG.md.

[changelog]
# The header must match the top of CHANGELOG.md exactly so that --prepend
# knows where to insert new entries (right after the header).
header = """# Changelog

All notable changes to this project will be documented in this file.

The format is based on [Keep a Changelog](https://keepachangelog.com/en/1.1.0/),
and this project adheres to [Semantic Versioning](https://semver.org/spec/v2.0.0.html).

Generated by [git-cliff](https://git-cliff.org/).

"""

body = """
{% if version -%}
    ## {{ version | trim_start_matches(pat="v") }} - {{ timestamp | date(format="%Y-%m-%d") }}
{% else -%}
    ## Unreleased
{% endif -%}

{% for group, commits in commits | group_by(attribute="group") %}
    ### {{ group | striptags | trim | upper_first }}
    {% for commit in commits %}
        - {% if commit.scope %}**{{ commit.scope }}**: {% endif %}{{ commit.message | split(pat="\n") | first | trim }}\
    {% endfor %}
{% endfor %}\n
"""

footer = ""
trim = true

[git]
conventional_commits = true
filter_unconventional = true
split_commits = false
tag_pattern = "v[0-9].*"
sort_commits = "newest"
protect_breaking_commits = false
filter_commits = false

commit_preprocessors = [
    { pattern = '\.$', replace = '' },
]

commit_parsers = [
    # Skip noise
    { message = "^Merge", skip = true },

    # Skip internal maintenance types
    { message = "^chore", skip = true },
    { message = "^test", skip = true },
    { message = "^ci", skip = true },
    { message = "^build", skip = true },
    { message = "^style", skip = true },

    # Conventional commit types → Keep a Changelog groups
    { message = "^feat", group = "Added" },
    { message = "^fix", group = "Fixed" },
    { message = "^refactor", group = "Changed" },
    { message = "^perf", group = "Changed" },
    { message = "^docs", group = "Documentation" },
    { message = "^revert", group = "Removed" },
]
